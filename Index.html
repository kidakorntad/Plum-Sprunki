<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprunki Custom Maker - Minimalist Edition</title>
    <!-- Tone.js for Precise Audio Sync -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --slot-bg: #1e293b;
            --accent: #10b981;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h1 { margin-bottom: 5px; font-weight: 800; }
        .subtitle { color: #94a3b8; margin-bottom: 25px; }

        /* Character Slots Container */
        #game-board {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .character-slot {
            width: 150px;
            height: 200px;
            background-color: var(--slot-bg);
            border: 2px solid #334155;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
        }

        .character-slot.drag-over {
            border-color: var(--accent);
            background-color: #0f172a;
        }

        .character-slot.active {
            border-color: var(--accent);
            border-style: solid;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        /* Icons Panel */
        #instrument-panel {
            background: #1e293b;
            padding: 20px 40px;
            border-radius: 100px;
            display: flex;
            gap: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .instrument {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            color: white;
            transition: transform 0.2s;
        }

        .instrument:hover { transform: scale(1.1); }
        
        .beat { background: #ef4444; }
        .melo { background: #3b82f6; }
        .vocal { background: #eab308; }

        .controls { margin-bottom: 20px; }
        button {
            padding: 10px 24px;
            font-size: 14px;
            border-radius: 10px;
            border: none;
            background: #f1f5f9;
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { background: var(--accent); color: white; }
        .reset-btn { background: #450a0a; color: #fca5a5; margin-left: 10px; }

        .label { font-size: 12px; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>SPRINKI CLONE</h1>
    <p class="subtitle">Drag instruments to slots to start the mix</p>
    
    <div class="controls">
        <button id="start-btn">เริ่มระบบเสียง (Engine Start)</button>
        <button class="reset-btn" onclick="resetGame()">ล้างทั้งหมด</button>
    </div>

    <div id="game-board">
        <div class="character-slot" id="char1">Character 1</div>
        <div class="character-slot" id="char2">Character 2</div>
        <div class="character-slot" id="char3">Character 3</div>
        <div class="character-slot" id="char4">Character 4</div>
        <div class="character-slot" id="char5">Character 5</div>
    </div>
    
    <div id="instrument-panel">
        <div class="instrument beat" id="sound1" draggable="true">BEAT 1</div>
        <div class="instrument beat" id="sound2" draggable="true">BEAT 2</div>
        <div class="instrument melo" id="sound3" draggable="true">MELO 1</div>
        <div class="instrument melo" id="sound4" draggable="true">MELO 2</div>
        <div class="instrument vocal" id="sound5" draggable="true">VOCAL</div>
    </div>

    <script>
        const sampleUrls = {
            'sound1': 'https://tonejs.github.io/audio/loop/drums.mp3',
            'sound2': 'https://tonejs.github.io/audio/loop/cool-loop.mp3',
            'sound3': 'https://tonejs.github.io/audio/loop/chime.mp3',
            'sound4': 'https://tonejs.github.io/audio/loop/loops.mp3',
            'sound5': 'https://tonejs.github.io/audio/loop/funky.mp3'
        };

        const players = {};
        let engineStarted = false;

        Object.keys(sampleUrls).forEach(key => {
            players[key] = new Tone.Player(sampleUrls[key]).toDestination();
            players[key].loop = true;
        });

        document.getElementById('start-btn').addEventListener('click', async () => {
            await Tone.start();
            Tone.Transport.bpm.value = 120;
            Tone.Transport.start();
            engineStarted = true;
            document.getElementById('start-btn').innerText = "Engine Active";
            document.getElementById('start-btn').disabled = true;
        });

        const instruments = document.querySelectorAll('.instrument');
        const slots = document.querySelectorAll('.character-slot');

        instruments.forEach(inst => {
            inst.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', e.target.id);
            });
        });

        slots.forEach(slot => {
            slot.addEventListener('dragover', (e) => {
                e.preventDefault();
                slot.classList.add('drag-over');
            });

            slot.addEventListener('dragleave', () => {
                slot.classList.remove('drag-over');
            });

            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                
                if (!engineStarted) return;

                const soundId = e.dataTransfer.getData('text/plain');
                if (players[soundId]) {
                    players[soundId].start("@1n"); 
                    slot.classList.add('active');
                    slot.style.backgroundColor = window.getComputedStyle(document.getElementById(soundId)).backgroundColor;
                    slot.innerText = soundId.toUpperCase();
                }
            });
        });
