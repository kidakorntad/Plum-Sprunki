<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprunki Custom Maker - Production Edition</title>
    <!-- 1. Tone.js: Library สำหรับจัดการ Web Audio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;    
            --slot-bg: #ffffff;     
            --accent: #10b981;      
            --warning: #f59e0b;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            user-select: none;
        }

        h1 { margin-bottom: 5px; font-weight: 800; font-size: 1.5rem; color: var(--accent); }
        .subtitle { color: #94a3b8; margin-bottom: 25px; font-size: 0.9rem; text-align: center; }

        #game-board {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 900px;
        }

        .character-slot {
            width: 160px; 
            height: 230px;
            background-color: var(--slot-bg);
            border: 2px solid #334155;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; 
            padding-bottom: 10px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden; 
        }

        .char-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transform: scale(1.2); 
            transform-origin: center center;
            transition: transform 0.3s ease, opacity 0.3s;
            opacity: 0;
        }

        .active .char-img {
            transform: scale(1.3);
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1.3) translateY(0); }
            to { transform: scale(1.3) translateY(-5px); }
        }

        .character-slot.drag-over {
            border-color: var(--accent);
            background-color: #f1f5f9;
        }

        .character-slot.active {
            border-color: var(--accent);
            border-width: 4px;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
        }

        .status-indicator {
            font-size: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 2px 10px;
            border-radius: 20px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid #334155;
            z-index: 10;
        }

        .active .status-indicator {
            background: var(--accent);
            color: #000;
            font-weight: bold;
        }

        .loading-status {
            background: var(--warning) !important;
            color: #000 !important;
        }

        #instrument-panel {
            background: #1e293b;
            padding: 15px 30px;
            border-radius: 100px;
            display: flex;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        .instrument {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            color: white;
            transition: transform 0.2s;
            touch-action: none;
        }

        .instrument:hover { transform: scale(1.1); }
        .beat { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .melo { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .vocal { background: linear-gradient(135deg, #fbbf24, #d97706); }

        .controls { margin-bottom: 25px; display: flex; gap: 10px; }
        button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: #f1f5f9;
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { background: var(--accent); color: white; }
        .reset-btn { background: #450a0a; color: #fca5a5; }
        
    </style>
</head>
<body>

    <h1>SPRINKI MAKER</h1>
    <p class="subtitle">ระบบดึงไฟล์เสียง .wav และจัดการรูปภาพแบบ Real-time</p>
    
    <div class="controls">
        <button id="start-btn">1. เริ่มระบบเสียง (Engine Start)</button>
        <button class="reset-btn" onclick="resetGame()">2. ล้างเวที</button>
    </div>

    <div id="game-board">
        <div class="character-slot" id="char1" data-id="1">
            <img src="" class="char-img">
            <div class="status-indicator">Idle</div>
        </div>
        <div class="character-slot" id="char2" data-id="2">
            <img src="" class="char-img">
            <div class="status-indicator">Idle</div>
        </div>
        <div class="character-slot" id="char3" data-id="3">
            <img src="" class="char-img">
            <div class="status-indicator">Idle</div>
        </div>
        <div class="character-slot" id="char4" data-id="4">
            <img src="" class="char-img">
            <div class="status-indicator">Idle</div>
        </div>
        <div class="character-slot" id="char5" data-id="5">
            <img src="" class="char-img">
            <div class="status-indicator">Idle</div>
        </div>
    </div>
    
    <div id="instrument-panel">
        <div class="instrument beat" id="sound1" draggable="true" data-sound="sound1.wav">BEAT 1</div>
        <div class="instrument beat" id="sound2" draggable="true" data-sound="sound2.wav">BEAT 2</div>
        <div class="instrument melo" id="sound3" draggable="true" data-sound="sound3.wav">MELO 1</div>
        <div class="instrument melo" id="sound4" draggable="true" data-sound="sound4.wav">MELO 2</div>
        <div class="instrument vocal" id="sound5" draggable="true" data-sound="sound5.wav">VOCAL</div>
    </div>

    <script>
        const players = {};
        let engineStarted = false;

        function updateCharacterState(slotElement, charId, status) {
            const fileName = `char${charId}-${status}.png`;
            const imgElement = slotElement.querySelector('.char-img');
            const indicator = slotElement.querySelector('.status-indicator');
            
            if (imgElement) {
                imgElement.src = fileName;
                imgElement.onload = () => imgElement.style.opacity = '1';
                imgElement.onerror = () => {
                    console.error(`Asset missing: ${fileName}`);
                    imgElement.style.opacity = '0';
                };
            }
            if (indicator) {
                indicator.innerText = status;
                if (status === 'Loading...') indicator.classList.add('loading-status');
                else indicator.classList.remove('loading-status');
            }
        }

        // โหลดเสียงล่วงหน้าทันทีที่เปิดหน้าเว็บ (Pre-load Strategy)
        function preLoadSounds() {
            document.querySelectorAll('.instrument').forEach(inst => {
                const soundFile = inst.dataset.sound;
                players[inst.id] = new Tone.Player({
                    url: soundFile,
                    loop: true,
                    autostart: false
                }).toDestination();
            });
        }

        // เรียกใช้งานทันที
        preLoadSounds();

        // เริ่มต้นสถานะภาพทั้งหมด
        document.querySelectorAll('.character-slot').forEach(slot => {
            updateCharacterState(slot, slot.dataset.id, 'idle');
        });

        const startBtn = document.getElementById('start-btn');
        startBtn.addEventListener('click', async () => {
            await Tone.start();
            Tone.Transport.bpm.value = 120;
            Tone.Transport.start();
            engineStarted = true;
            startBtn.innerText = "ระบบออนไลน์ 🟢";
            startBtn.disabled = true;
        });

        const instruments = document.querySelectorAll('.instrument');
        const slots = document.querySelectorAll('.character-slot');

        instruments.forEach(inst => {
            inst.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', e.target.id);
            });
        });

        slots.forEach(slot => {
            slot.addEventListener('dragover', (e) => e.preventDefault());
            slot.addEventListener('dragenter', () => slot.classList.add('drag-over'));
            slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));

            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                
                if (!engineStarted) {
                    alert("กรุณากดปุ่ม 'เริ่มระบบเสียง' ก่อนครับ");
                    return;
                }

                const soundId = e.dataTransfer.getData('text/plain');
                const charId = slot.dataset.id;
                const player = players[soundId];

                // อัปเดตภาพทันทีเพื่อให้ User รู้สึกว่าระบบทำงานแล้ว (Visual Feedback)
                slot.classList.add('active');
                updateCharacterState(slot, charId, 'active');

                // ฟังก์ชันเล่นเสียงพร้อมระบบ Check Loading
                const playWhenReady = () => {
                    if (player.loaded) {
                        player.start("@1n");
                        updateCharacterState(slot, charId, 'active');
                    } else {
                        // ถ้ายังโหลดไม่เสร็จ ให้แสดงสถานะ Loading และลองใหม่ทุกๆ 100ms
                        updateCharacterState(slot, charId, 'Loading...');
                        setTimeout(playWhenReady, 100);
                    }
                };

                if (player) playWhenReady();
            });
        });

        function resetGame() {
            Object.values(players).forEach(p => p.stop());
            slots.forEach(slot => {
                slot.classList.remove('active');
                updateCharacterState(slot, slot.dataset.id, 'idle');
            });
        }
    </script>
</body>
</html>
