<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprunki Custom Maker - Production Edition</title>
    <!-- 1. Tone.js: ห้องสมุดจัดการเสียงที่แม่นยำระดับห้องอัด เพื่อให้เสียง Loop ตรงจังหวะกันเป๊ะ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        /* 2. Design Tokens: เน้นความสะอาดตา (Minimalist) และพื้นหลังขาวบริสุทธิ์ */
        :root {
            --bg-color: #0f172a;    
            --slot-bg: #ffffff;     
            --accent: #10b981;      
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            user-select: none;
        }

        h1 { margin-bottom: 5px; font-weight: 800; font-size: 1.5rem; color: var(--accent); }
        .subtitle { color: #94a3b8; margin-bottom: 25px; font-size: 0.9rem; text-align: center; }

        /* 3. Game Board */
        #game-board {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 900px;
        }

        /* 4. Character Slot: ปรับปรุงโครงสร้างเพื่อการจัดวางรูปภาพแบบ Absolute */
        .character-slot {
            width: 160px; /* เพิ่มขนาดเล็กน้อยเพื่อความชัดเจน */
            height: 230px;
            background-color: var(--slot-bg);
            border: 2px solid #334155;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; 
            padding-bottom: 10px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden; /* ตัดส่วนเกินที่ซูมออกไป */
        }

        /* 5. Image Container: หัวใจสำคัญของการแก้ปัญหาภาพไม่เต็มกรอบ */
        .char-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* object-fit: contain จะรักษาอัตราส่วนภาพไว้ */
            object-fit: contain; 
            /* ซูมภาพขึ้น 20% เพื่อกำจัดขอบขาวที่อาจติดมากับไฟล์ต้นฉบับ */
            transform: scale(1.2); 
            transform-origin: center center;
            transition: transform 0.3s ease;
        }

        .active .char-img {
            /* เมื่อ active อาจจะเพิ่มลูกเล่นการขยับเล็กน้อย */
            transform: scale(1.3);
        }

        .character-slot.drag-over {
            border-color: var(--accent);
            background-color: #f8fafc;
        }

        .character-slot.active {
            border-color: var(--accent);
            border-width: 4px;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
        }

        /* 6. Status Label */
        .status-indicator {
            font-size: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 2px 10px;
            border-radius: 20px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid #334155;
            z-index: 10;
        }

        .active .status-indicator {
            background: var(--accent);
            color: #000;
            font-weight: bold;
        }

        /* 7. Instrument Panel */
        #instrument-panel {
            background: #1e293b;
            padding: 15px 30px;
            border-radius: 100px;
            display: flex;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        .instrument {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            color: white;
            transition: transform 0.2s;
            touch-action: none;
        }

        .instrument:hover { transform: scale(1.1); }
        .beat { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .melo { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .vocal { background: linear-gradient(135deg, #fbbf24, #d97706); }

        .controls { margin-bottom: 25px; display: flex; gap: 10px; }
        button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: #f1f5f9;
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { background: var(--accent); color: white; }
        .reset-btn { background: #450a0a; color: #fca5a5; }
        
    </style>
</head>
<body>

    <h1>SPRINKI MAKER</h1>
    <p class="subtitle">ลากไอคอนไปวางเพื่อเริ่มการแสดง (ปรับแต่งการแสดงผลภาพให้เต็มกรอบ)</p>
    
    <div class="controls">
        <button id="start-btn">1. เริ่มระบบเสียง (Engine Start)</button>
        <button class="reset-btn" onclick="resetGame()">2. ล้างเวที</button>
    </div>

    <div id="game-board">
        <!-- สร้างโครงสร้างที่มี <img> แท็กเพื่อการจัดการที่แม่นยำกว่า background-image -->
        <div class="character-slot" id="char1" data-id="1">
            <img src="" class="char-img" id="img-1">
            <div class="status-indicator">Idle</div>
        </div>
        <div class="character-slot" id="char2" data-id="2">
            <img src="" class="char-img" id="img-2">
            <div class="status-indicator">Idle</div>
        </div>
        <div class="character-slot" id="char3" data-id="3">
            <img src="" class="char-img" id="img-3">
            <div class="status-indicator">Idle</div>
        </div>
        <div class="character-slot" id="char4" data-id="4">
            <img src="" class="char-img" id="img-4">
            <div class="status-indicator">Idle</div>
        </div>
        <div class="character-slot" id="char5" data-id="5">
            <img src="" class="char-img" id="img-5">
            <div class="status-indicator">Idle</div>
        </div>
    </div>
    
    <div id="instrument-panel">
        <div class="instrument beat" id="sound1" draggable="true">BEAT 1</div>
        <div class="instrument beat" id="sound2" draggable="true">BEAT 2</div>
        <div class="instrument melo" id="sound3" draggable="true">MELO 1</div>
        <div class="instrument melo" id="sound4" draggable="true">MELO 2</div>
        <div class="instrument vocal" id="sound5" draggable="true">VOCAL</div>
    </div>

    <script>
        const sampleUrls = {
            'sound1': 'https://tonejs.github.io/audio/loop/drums.mp3',
            'sound2': 'https://tonejs.github.io/audio/loop/cool-loop.mp3',
            'sound3': 'https://tonejs.github.io/audio/loop/chime.mp3',
            'sound4': 'https://tonejs.github.io/audio/loop/loops.mp3',
            'sound5': 'https://tonejs.github.io/audio/loop/funky.mp3'
        };

        const players = {};
        let engineStarted = false;

        /**
         * ฟังก์ชันอัปเดตรูปภาพ
         * เปลี่ยนจากการแก้ CSS background มาเป็นการเปลี่ยน src ของ <img> โดยตรง
         */
        function updateCharacterState(slotElement, charId, status) {
            const fileName = `char${charId}-${status}.png`;
            const imgElement = slotElement.querySelector('.char-img');
            
            if (imgElement) {
                imgElement.src = fileName;
                // ถ้าภาพโหลดไม่ขึ้น (error) ให้ซ่อนตัวภาพไปก่อนเพื่อความสะอาด
                imgElement.onerror = () => imgElement.style.opacity = '0';
                imgElement.onload = () => imgElement.style.opacity = '1';
            }
            
            const indicator = slotElement.querySelector('.status-indicator');
            if (indicator) indicator.innerText = status;
        }

        Object.keys(sampleUrls).forEach(key => {
            players[key] = new Tone.Player(sampleUrls[key]).toDestination();
            players[key].loop = true;
        });

        document.querySelectorAll('.character-slot').forEach(slot => {
            updateCharacterState(slot, slot.dataset.id, 'idle');
        });

        const startBtn = document.getElementById('start-btn');
        startBtn.addEventListener('click', async () => {
            await Tone.start();
            Tone.Transport.bpm.value = 120;
            Tone.Transport.start();
            engineStarted = true;
            startBtn.innerText = "ระบบออนไลน์ 🟢";
            startBtn.disabled = true;
        });

        const instruments = document.querySelectorAll('.instrument');
        const slots = document.querySelectorAll('.character-slot');

        instruments.forEach(inst => {
            inst.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', e.target.id);
            });
        });

        slots.forEach(slot => {
            slot.addEventListener('dragover', (e) => {
                e.preventDefault();
                slot.classList.add('drag-over');
            });

            slot.addEventListener('dragleave', () => {
                slot.classList.remove('drag-over');
            });

            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                if (!engineStarted) return;

                const soundId = e.dataTransfer.getData('text/plain');
                const charId = slot.dataset.id;

                if (players[soundId]) {
                    players[soundId].start("@1n");
                    slot.classList.add('active');
                    updateCharacterState(slot, charId, 'active');
                }
            });
        });

        function resetGame() {
            Object.values(players).forEach(p => p.stop());
            slots.forEach(slot => {
                slot.classList.remove('active');
                updateCharacterState(slot, slot.dataset.id, 'idle');
            });
        }
    </script>
</body>
</html>
